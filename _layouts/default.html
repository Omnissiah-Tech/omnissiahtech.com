<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:url" content="{{ site.url }}">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,500&family=Manrope:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
</head>
<body>

<header class="nav">
  <a class="brand" href="{{ '/' | relative_url }}"><span class="dot"></span>OmnissiahTech</a>
  <nav class="nav-links">
    <a href="#products">Products</a>
    <a href="#careers">Careers</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

{{ content }}

<footer>
  <span>&copy; 2026 OmnissiahTech</span>
  <span class="mono">v0.1</span>
</footer>

</body>
</html>
